spring.application.name=aura-backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# validate: Hibernate checks that entities match the schema but does NOT alter it.
# Schema changes are now owned entirely by Flyway migration scripts.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.signerKey=${JWT_SIGNER_KEY}
jwt.valid-duration=3600
jwt.refresh-duration=604800

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web.cors=TRACE

# ─── Flyway ───────────────────────────────────────────────────────────────────
# locations   : where Flyway looks for migration scripts
# baseline-on-migrate : when the flyway_schema_history table does not exist yet,
#               treat the current database as already at version 1 (baseline).
#               This is safe for the existing production database — V1 is skipped.
#               On a fresh database (CI, new deployment) V1 is applied normally.
# baseline-version : the version number assigned to the baseline state
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Upload File
file.upload-dir=uploads

# Emotion Analysis Service (FastAPI / PhoBERT)
# Override in production via environment variable: EMOTION_SERVICE_URL
emotion.service.url=${EMOTION_SERVICE_URL:https://aurasystem-production.up.railway.app/predict}

# Gemini API Configuration
# Override in production via environment variables
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent}
gemini.api.key=${GEMINI_API_KEY}
gemini.api.timeout=${GEMINI_API_TIMEOUT:30}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Recommendation Weights (Milestone 3) ───────────────────────────────────────
# Scoring weights for personalized quest recommendations.
# Weights must sum to 1.0. Changing these requires no recompilation.
recommendation.weights.emotion=0.35
recommendation.weights.category=0.25
recommendation.weights.activity=0.20
recommendation.weights.history=0.10
recommendation.weights.diversity=0.10
recommendation.weights.futureDecay=0.05